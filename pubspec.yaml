name: arena_flow
description: A cross-platform mobile app to improve physical event experience at massive sporting venues.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Routing
  go_router: ^12.1.1
  # UI & Maps (Using OpenStreetMap for completely functional mapping)
  flutter_map: any
  latlong2: any
  # Firebase Services (Mocked setups for now as per Clean Architecture implementation)
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_messaging: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
